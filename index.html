<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BLK — Marketplace Fashion Congo 🇨🇬</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;500;600;700&display=swap');

:root { 
--primary: #4A7C59; 
--yellow: #E6A01E; 
--red: #C82828; 
--black: #0D0D0D; 
--white: #F5F0E8; 
--gray: #1C1C1C; 
--gray2: #2A2A2A; 
--text-muted: #777; 
}

	•	{ 
	•	margin: 0; 
	•	padding: 0; 
	•	box-sizing: border-box; 
	•	-webkit-tap-highlight-color: transparent; 
	•	}

html, body { 
width: 100%; 
height: 100%; 
}

body { 
background: var(--black); 
font-family: 'DM Sans', sans-serif; 
color: var(--white); 
display: flex; 
justify-content: center; 
align-items: center; 
min-height: 100vh; 
padding: 0; 
margin: 0; 
}

.app-container { 
width: 100%; 
max-width: 390px; 
height: 100vh; 
background: var(--black); 
overflow: hidden; 
display: flex; 
flex-direction: column; 
position: relative; 
}

.kente-accent { 
height: 3px; 
background: repeating-linear-gradient(90deg, var(--red) 0px, var(--red) 20px, var(--yellow) 20px, var(--yellow) 40px, var(--primary) 40px, var(--primary) 60px, var(--black) 60px, var(--black) 80px); 
z-index: 1000; 
}

.carousel-container { 
position: absolute; 
top: 0; 
left: 0; 
right: 0; 
bottom: 0; 
width: 100%; 
height: 100%; 
overflow: hidden; 
}

.carousel-slide { 
position: absolute; 
width: 100%; 
height: 100%; 
opacity: 0; 
transition: opacity 0.8s ease-in-out; 
background-size: cover; 
background-position: center; 
}

.carousel-slide.active { 
opacity: 1; 
}

.glass-overlay { 
position: absolute; 
top: 0; 
left: 0; 
right: 0; 
bottom: 0; 
background: rgba(13, 13, 13, 0.75); 
backdrop-filter: blur(12px); 
-webkit-backdrop-filter: blur(12px); 
z-index: 2; 
}

.status-bar { 
display: flex; 
justify-content: space-between; 
align-items: center; 
padding: 14px 20px 0; 
font-size: 12px; 
font-weight: 600; 
color: var(--white); 
position: relative; 
z-index: 10; 
}

.screens { 
position: relative; 
z-index: 5; 
width: 100%; 
flex: 1; 
overflow: hidden; 
}

.screen { 
position: absolute; 
width: 100%; 
height: 100%; 
opacity: 0; 
visibility: hidden; 
transition: opacity 0.3s ease; 
display: flex; 
flex-direction: column; 
}

.screen.active { 
opacity: 1; 
visibility: visible; 
}

.auth-screen { 
background: linear-gradient(135deg, rgba(13,13,13,0.9) 0%, rgba(28,28,28,0.9) 100%); 
}

.auth-content { 
position: relative; 
z-index: 3; 
flex: 1; 
overflow-y: auto; 
display: flex; 
flex-direction: column; 
padding: 20px; 
}

.bg-decor { 
position: absolute; 
top: 0; 
left: 0; 
right: 0; 
height: 300px; 
pointer-events: none; 
}

.bg-circle { 
position: absolute; 
border-radius: 50%; 
}

.bg-circle-1 { 
width: 200px; 
height: 200px; 
background: radial-gradient(circle, rgba(230,160,30,0.15) 0%, transparent 70%); 
top: -50px; 
left: -50px; 
}

.bg-circle-2 { 
width: 150px; 
height: 150px; 
background: radial-gradient(circle, rgba(200,40,40,0.12) 0%, transparent 70%); 
top: 30px; 
right: -30px; 
}

.logo-area { 
position: relative; 
z-index: 3; 
display: flex; 
flex-direction: column; 
align-items: center; 
text-align: center; 
margin-bottom: 20px; 
}

.logo-icon { 
width: 60px; 
height: 60px; 
border-radius: 16px; 
background: var(--gray); 
border: 1.5px solid #333; 
display: flex; 
align-items: center; 
justify-content: center; 
margin-bottom: 12px; 
position: relative; 
overflow: hidden; 
box-shadow: 0 8px 24px rgba(230,160,30,0.2); 
}

.logo-icon::before { 
content: ''; 
position: absolute; 
bottom: 0; 
left: 0; 
right: 0; 
height: 2px; 
background: linear-gradient(90deg, var(--red), var(--yellow), var(--primary)); 
}

.logo-icon span { 
font-family: 'Archivo Black', sans-serif; 
font-size: 20px; 
background: linear-gradient(135deg, var(--white) 0%, var(--yellow) 100%); 
-webkit-background-clip: text; 
-webkit-text-fill-color: transparent; 
}

.logo-area h1 { 
font-family: 'Archivo Black', sans-serif; 
font-size: 22px; 
margin-bottom: 4px; 
}

.logo-area p { 
font-size: 12px; 
color: var(--text-muted); 
line-height: 1.4; 
}

.tabs { 
position: relative; 
z-index: 3; 
display: flex; 
background: var(--gray); 
border-radius: 12px; 
padding: 3px; 
gap: 3px; 
margin-bottom: 20px; 
}

.tab { 
flex: 1; 
padding: 10px; 
border-radius: 9px; 
text-align: center; 
font-size: 13px; 
font-weight: 700; 
cursor: pointer; 
transition: all 0.3s; 
color: var(--text-muted); 
user-select: none; 
border: none; 
background: none; 
}

.tab.active { 
background: var(--yellow); 
color: var(--black); 
}

.form-area { 
position: relative; 
z-index: 3; 
display: flex; 
flex-direction: column; 
gap: 12px; 
}

.input-group { 
display: flex; 
flex-direction: column; 
gap: 5px; 
}

.input-label { 
font-size: 10px; 
font-weight: 700; 
letter-spacing: 1px; 
text-transform: uppercase; 
color: var(--text-muted); 
}

.input-wrap { 
background: var(--gray); 
border-radius: 12px; 
display: flex; 
align-items: center; 
padding: 12px 14px; 
gap: 10px; 
border: 1.5px solid transparent; 
transition: border-color 0.2s; 
}

.input-wrap:focus-within { 
border-color: var(--yellow); 
background: #1f1f1f; 
}

.input-wrap .icon { 
font-size: 16px; 
flex-shrink: 0; 
}

.input-wrap input, 
.input-wrap select { 
background: none; 
border: none; 
outline: none; 
color: var(--white); 
font-family: 'DM Sans', sans-serif; 
font-size: 13px; 
flex: 1; 
-webkit-appearance: none; 
}

.input-wrap input::placeholder { 
color: var(--text-muted); 
}

.input-wrap select option { 
background: #1c1c1c; 
color: var(--white); 
}

.main-btn { 
width: 100%; 
padding: 14px; 
border-radius: 14px; 
border: none; 
background: linear-gradient(135deg, var(--yellow), #c8880a); 
color: var(--black); 
font-family: 'Archivo Black', sans-serif; 
font-size: 14px; 
letter-spacing: 0.5px; 
cursor: pointer; 
transition: transform 0.2s, box-shadow 0.2s; 
box-shadow: 0 8px 20px rgba(230,160,30,0.3); 
font-weight: 700; 
}

.main-btn:hover { 
transform: translateY(-2px); 
}

.main-btn:active { 
transform: scale(0.98); 
}

.error-msg, .success-msg { 
padding: 10px; 
border-radius: 8px; 
font-size: 11px; 
text-align: center; 
display: none; 
}

.error-msg { 
background: rgba(200, 40, 40, 0.2); 
border: 1px solid var(--red); 
color: #ff6b6b; 
}

.error-msg.show { 
display: block; 
}

.success-msg { 
background: rgba(74, 124, 89, 0.2); 
border: 1px solid var(--primary); 
color: #51cf66; 
}

.success-msg.show { 
display: block; 
}

.home-screen { 
background: var(--black); 
padding-bottom: 80px; 
}

.home-content { 
flex: 1; 
overflow-y: auto; 
display: flex; 
flex-direction: column; 
}

.home-header { 
display: flex; 
justify-content: space-between; 
align-items: center; 
padding: 16px; 
gap: 10px; 
}

.home-logo { 
font-family: 'Archivo Black', sans-serif; 
font-size: 16px; 
background: linear-gradient(135deg, var(--white) 0%, var(--yellow) 100%); 
-webkit-background-clip: text; 
-webkit-text-fill-color: transparent; 
}

.home-icons { 
display: flex; 
gap: 10px; 
}

.icon-btn { 
width: 36px; 
height: 36px; 
background: var(--gray); 
border: none; 
border-radius: 10px; 
cursor: pointer; 
display: flex; 
align-items: center; 
justify-content: center; 
font-size: 16px; 
position: relative; 
}

.icon-btn.active { 
background: var(--yellow); 
color: var(--black); 
}

.badge { 
position: absolute; 
top: -8px; 
right: -8px; 
background: var(--red); 
color: white; 
border-radius: 50%; 
width: 18px; 
height: 18px; 
display: flex; 
align-items: center; 
justify-content: center; 
font-size: 9px; 
font-weight: 700; 
}

.search-bar { 
padding: 0 16px; 
margin-bottom: 16px; 
}

.search-input { 
width: 100%; 
padding: 10px 14px; 
background: var(--gray); 
border: 1.5px solid #333; 
border-radius: 12px; 
color: var(--white); 
font-family: 'DM Sans', sans-serif; 
font-size: 13px; 
}

.search-input::placeholder { 
color: var(--text-muted); 
}

.section-title { 
font-size: 13px; 
font-weight: 700; 
margin: 16px 16px 10px; 
}

.carousel-products { 
padding: 0 16px; 
margin-bottom: 16px; 
overflow-x: auto; 
display: flex; 
gap: 10px; 
scroll-behavior: smooth; 
}

.carousel-products::-webkit-scrollbar { 
display: none; 
}

.product-card { 
min-width: 120px; 
background: var(--gray); 
border-radius: 14px; 
overflow: hidden; 
cursor: pointer; 
transition: transform 0.2s; 
}

.product-card:active { 
transform: scale(0.95); 
}

.product-image { 
width: 100%; 
height: 120px; 
background: linear-gradient(135deg, #2a2a2a, #3a3a3a); 
display: flex; 
align-items: center; 
justify-content: center; 
font-size: 40px; 
}

.product-info { 
padding: 8px; 
}

.product-name { 
font-size: 11px; 
font-weight: 700; 
white-space: nowrap; 
overflow: hidden; 
text-overflow: ellipsis; 
}

.product-price { 
font-size: 12px; 
color: var(--yellow); 
font-weight: 700; 
margin-top: 3px; 
}

.products-section { 
padding: 0 16px; 
flex: 1; 
}

.products-grid { 
display: grid; 
grid-template-columns: 1fr 1fr; 
gap: 10px; 
margin-bottom: 20px; 
}

.product-card-large { 
background: var(--gray); 
border-radius: 14px; 
overflow: hidden; 
cursor: pointer; 
transition: transform 0.2s; 
}

.product-card-large:active { 
transform: scale(0.95); 
}

.product-card-large .product-image { 
height: 110px; 
}

.bottom-nav { 
position: fixed; 
bottom: 0; 
left: 50%; 
transform: translateX(-50%); 
width: 100%; 
max-width: 390px; 
height: 70px; 
background: var(--black); 
border-top: 1px solid #2a2a2a; 
display: flex; 
justify-content: space-around; 
align-items: center; 
z-index: 50; 
}

.nav-item { 
display: flex; 
flex-direction: column; 
align-items: center; 
gap: 2px; 
cursor: pointer; 
font-size: 10px; 
color: var(--text-muted); 
flex: 1; 
text-align: center; 
transition: color 0.2s; 
}

.nav-item.active { 
color: var(--yellow); 
}

.nav-item-icon { 
font-size: 18px; 
}

@media (max-width: 390px) { 
.app-container { 
max-width: 100%; 
} 
} 
</style>
</head>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDdxKjF1hU_REMPLACE_ICI",
    authDomain: "blk-congo-29463.firebaseapp.com",
    projectId: "blk-congo-29463",
    storageBucket: "blk-congo-29463.appspot.com",
    messagingSenderId: "REMPLACE_ICI",
    appId: "REMPLACE_ICI"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let currentUser = null;
  let products = [];

  const carouselImages = [
    'https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=500&h=844&fit=crop',
    'https://images.unsplash.com/photo-1491553895911-0055eca6402d?w=500&h=844&fit=crop',
    'https://images.unsplash.com/photo-1566150905458-1bf1fc113f0d?w=500&h=844&fit=crop',
    'https://images.unsplash.com/photo-1594938298603-c8148c4dae35?w=500&h=844&fit=crop',
    'https://images.unsplash.com/photo-1595557707802-21b287e3f862?w=500&h=844&fit=crop',
    'https://images.unsplash.com/photo-1509315811437-12e1ac439ec8?w=500&h=844&fit=crop',
    'https://images.unsplash.com/photo-1598808503676-c446ef69f3e0?w=500&h=844&fit=crop',
    'https://images.unsplash.com/photo-1539533057440-7814baea1002?w=500&h=844&fit=crop',
  ];

  let currentSlide = 0;

  function initCarousel(containerId) {
    const container = document.getElementById(containerId);
    if (!container) return;
    
    carouselImages.forEach((img, index) => {
      const slide = document.createElement('div');
      slide.className = `carousel-slide ${index = 0 ? 'active' : ''}`;
      slide.style.backgroundImage = `url('${img}')`;
      container.appendChild(slide);
    });

    setInterval(() => {
      const slides = container.querySelectorAll('.carousel-slide');
      slides[currentSlide].classList.remove('active');
      currentSlide = (currentSlide + 1) % slides.length;
      slides[currentSlide].classList.add('active');
    }, 5000);
  }

  function switchAuthTab(tab) {
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');
    
    if (tab = 'login') {
      loginForm.style.display = 'block';
      signupForm.style.display = 'none';
      document.getElementById('authTitle').textContent = 'Bon retour 👋';
      document.querySelector('.tab:nth-child(1)').classList.add('active');
      document.querySelector('.tab:nth-child(2)').classList.remove('active');
    } else {
      loginForm.style.display = 'none';
      signupForm.style.display = 'block';
      document.getElementById('authTitle').textContent = 'Rejoins BLK! 🎉';
      document.querySelector('.tab:nth-child(1)').classList.remove('active');
      document.querySelector('.tab:nth-child(2)').classList.add('active');
    }
  }

  async function handleLogin() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    if (!email || !password) {
      showError('Remplir tous les champs');
      return;
    }

    try {
      await auth.signInWithEmailAndPassword(email, password);
      showSuccess('Connexion réussie!');
      setTimeout(() => switchScreen('home'), 1200);
    } catch (error) {
      showError(error.message);
    }
  }

  async function handleSignup() {
    const name = document.getElementById('signupName').value;
    const email = document.getElementById('signupEmail').value;
    const phone = document.getElementById('signupPhone').value;
    const city = document.getElementById('signupCity').value;
    const password = document.getElementById('signupPassword').value;

    if (!name || !email || !phone || !city || !password) {
      showError('Remplir tous les champs');
      return;
    }

    try {
      const userCred = await auth.createUserWithEmailAndPassword(email, password);
      
      await db.collection('users').doc(userCred.user.uid).set({
        name, email, phone, city,
        role: 'buyer',
        balance: 0,
        createdAt: new Date(),
        flames: 0
      });

      showSuccess('Compte créé!');
      setTimeout(() => switchScreen('home'), 1200);
    } catch (error) {
      showError(error.message);
    }
  }

  function showError(msg) {
    const el = document.getElementById('authError');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  function showSuccess(msg) {
    const el = document.getElementById('authSuccess');
    el.textContent = msg;
    el.classList.add('show');
  }

  function switchScreen(screenName) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenName + 'Screen').classList.add('active');
    
    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
    if (screenName === 'home') {
      document.querySelector('.nav-item').classList.add('active');
      loadProducts();
    }
  }

  async function loadProducts() {
    try {
      const snapshot = await db.collection('products').limit(20).get();
      products = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      displayProducts(products);
    } catch (error) {
      products = [
        { id: '1', name: 'Robe Wax', price: 12500, emoji: '👗', seller: 'Mama Léa' },
        { id: '2', name: 'Sneakers', price: 35000, emoji: '👟', seller: 'Patrick' },
        { id: '3', name: 'Sac Cuir', price: 28000, emoji: '👜', seller: 'Sophie' },
        { id: '4', name: 'Montre', price: 45000, emoji: '⌚', seller: 'Jean' },
        { id: '5', name: 'Blazer', price: 22000, emoji: '🧥', seller: 'Marie' },
        { id: '6', name: 'Bottines', price: 18000, emoji: '👢', seller: 'Lisa' },
      ];
      displayProducts(products);
    }
  }

  function displayProducts(items) {
    const grid = document.getElementById('productsGrid');
    grid.innerHTML = items.map(p => `
      <div class="product-card-large" onclick="alert('${p.name} - ${p.price} FCFA\\nPaiement réel MTN/Airtel/Orange')">
        <div class="product-image">${p.emoji}</div>
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-price">${p.price.toLocaleString()} F</div>
        </div>
      </div>
    `).join('');
  }

  function filterCategory(cat) {
    console.log('Filter:', cat);
  }

  function showCart() { alert('🛒 Panier'); }
  function showFavorites() { alert('❤️ Favoris'); }
  function showMessages() { alert('💬 Messages Temps Réel'); }
  function showTimers() { alert('⏱️ Tracking Livraison'); }
  function showProfile() { alert('👤 Profil Vendeur/Acheteur'); }

  auth.onAuthStateChanged((user) => {
    currentUser = user;
    if (user) {
      document.getElementById('authScreen').classList.remove('active');
      document.getElementById('homeScreen').classList.add('active');
      loadProducts();
    } else {
      document.getElementById('authScreen').classList.add('active');
      document.getElementById('homeScreen').classList.remove('active');
    }
  });

  setInterval(() => {
    const now = new Date();
    document.getElementById('timeDisplay').textContent = 
      `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  }, 1000);

  window.addEventListener('load', () => {
    initCarousel('authCarouselContainer');
  });
</script>


</body>
</html>
