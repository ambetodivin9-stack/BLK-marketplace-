<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLK Marketplace</title>
    <script src="https://www.gstatic.com/firebaseapp/10.5.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebaseapp/10.5.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebaseapp/10.5.0/firebase-firestore.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0F0F0F; color: #FFF; }
        .kente { height: 8px; background: linear-gradient(90deg, #FFA500 0%, #2ECC71 20%, #E74C3C 40%, #FFA500 60%, #2ECC71 80%, #E74C3C 100%); }
        header { background: #1A1A1A; padding: 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,165,0,0.2); display: none; }
        .logo { font-size: 24px; font-weight: 800; color: #FFA500; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px 16px 120px; min-height: calc(100vh - 50px); display: none; }
        .page { display: none; }
        .page.active { display: block; }
        .login-container { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .login-box { background: #1A1A1A; border: 2px solid #FFA500; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; }
        .login-box h2 { text-align: center; margin-bottom: 30px; color: #FFA500; font-size: 28px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #FFF; font-size: 14px; }
        input { width: 100%; padding: 12px 16px; border: 1px solid rgba(255,165,0,0.3); border-radius: 8px; background: #0F0F0F; color: #FFF; font-family: inherit; font-size: 14px; }
        input:focus { outline: none; border-color: #FFA500; box-shadow: 0 0 0 3px rgba(255,165,0,0.1); }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 14px; width: 100%; }
        .btn-primary { background: #FFA500; color: #000; }
        .btn-primary:hover { background: #FF8C00; }
        .login-toggle { text-align: center; margin-top: 20px; color: #CCC; font-size: 14px; }
        .login-toggle button { background: none; border: none; color: #FFA500; cursor: pointer; font-weight: 600; text-decoration: underline; }
        .tabs { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: #1A1A1A; border-top: 1px solid rgba(255,165,0,0.2); padding: 8px 16px; gap: 8px; z-index: 100; display: none; }
        .tab-btn { flex: 1; padding: 12px 8px; border: none; background: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; color: #CCC; font-size: 12px; }
        .tab-btn.active { color: #FFA500; }
        .card { background: #1A1A1A; border: 1px solid rgba(255,165,0,0.2); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        .card:hover { border-color: #FFA500; background: rgba(255,165,0,0.05); }
        .card-img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; margin-bottom: 12px; }
        .card-title { font-weight: 600; font-size: 16px; margin-bottom: 4px; color: #FFF; }
        .card-price { color: #FFA500; font-weight: 700; font-size: 18px; margin-bottom: 8px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; display: none; }
        .alert.active { display: block; }
        .alert-success { background: rgba(46,204,113,0.2); color: #2ECC71; border: 1px solid rgba(46,204,113,0.5); }
        .alert-error { background: rgba(231,76,60,0.2); color: #E74C3C; border: 1px solid rgba(231,76,60,0.5); }
        h1 { margin-bottom: 20px; font-size: 24px; color: #FFF; }
        .empty-state { text-align: center; padding: 40px 20px; color: #CCC; }
    </style>
</head>
<body>

<div class="kente"></div>

<header id="header">
    <span class="logo">🔶 BLK</span>
</header>

<div id="container" class="container">
    <div id="alertBox" class="alert"></div>

<div id="homePage" class="page active">
    <h1>🛍️ Explorer</h1>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Chercher..." style="margin-bottom: 16px;" />
    </div>
    <div id="articlesGrid" class="grid"></div>
    <div id="emptyHome" class="empty-state" style="display: none;">
        <p>📦 Aucun article</p>
    </div>
</div>

<div id="sellPage" class="page">
    <h1>📤 Publier un Article</h1>
    <div class="card">
        <form id="publishForm">
            <div class="form-group">
                <label>Titre</label>
                <input type="text" id="articleTitle" required placeholder="Ex: Robe vintage" />
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="articleDesc" rows="3" required placeholder="Décris l'article..." style="border: 1px solid rgba(255,165,0,0.3); border-radius: 8px; background: #0F0F0F; color: #FFF; padding: 12px 16px; font-family: inherit; font-size: 14px;"></textarea>
            </div>
            <div class="form-group">
                <label>Prix (FCFA)</label>
                <input type="number" id="articlePrice" required placeholder="5000" />
            </div>
            <button type="submit" class="btn btn-primary">📤 Publier</button>
        </form>
    </div>
</div>

<div id="messagesPage" class="page">
    <h1>💬 Messages</h1>
    <div class="empty-state"><p>💭 Aucun message</p></div>
</div>

<div id="ordersPage" class="page">
    <h1>📦 Commandes</h1>
    <div class="empty-state"><p>📪 Aucune commande</p></div>
</div>

<div id="profilePage" class="page">
    <h1>👤 Profil</h1>
    <div id="profileNotAuth" class="empty-state">
        <p style="margin-bottom: 20px;">Connecte-toi pour voir ton profil</p>
    </div>
    <div id="profileAuth" style="display: none;">
        <div class="card">
            <p style="font-size: 18px; font-weight: 700; margin-bottom: 4px;" id="profileName">Chargement...</p>
            <p style="font-size: 12px; color: #CCC; margin-bottom: 16px;" id="profileEmail"></p>
            <button class="btn btn-primary" id="btnLogout" style="padding: 8px 12px; font-size: 12px;">Déconnexion</button>
        </div>
        <div class="card" style="border-color: #FFA500; margin-top: 20px;">
            <h3 style="color: #FFF;">💳 BLK Wallet</h3>
            <p style="margin: 12px 0; font-size: 20px; font-weight: 700; color: #FFA500;"><span id="walletBalance">0</span> FCFA</p>
        </div>
    </div>
</div>
</div>

<div id="loginPage" class="page active">
    <div class="login-container">
        <div class="login-box">
            <h2 id="loginTitle">🔐 Connexion</h2>
            <form id="loginForm" style="display: block;">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required placeholder="toi@example.com" />
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••" />
                </div>
                <button type="submit" class="btn btn-primary">Se connecter</button>
            </form>
            <form id="signupForm" style="display: none;">
                <div class="form-group">
                    <label>Nom complet</label>
                    <input type="text" id="signupName" placeholder="Ton nom" />
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signupEmail" required placeholder="toi@example.com" />
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="signupPassword" required placeholder="••••••••" />
                </div>
                <button type="submit" class="btn btn-primary">Créer un compte</button>
            </form>
            <div class="login-toggle">
                <span id="toggleText">Pas de compte? </span>
                <button type="button" id="toggleFormBtn">Créer un compte</button>
            </div>
        </div>
    </div>
</div>

<nav class="tabs" id="tabs">
    <button class="tab-btn active" data-page="homePage">🏠<br>Accueil</button>
    <button class="tab-btn" data-page="sellPage">📤<br>Vendre</button>
    <button class="tab-btn" data-page="messagesPage">💬<br>Messages</button>
    <button class="tab-btn" data-page="ordersPage">📦<br>Commandes</button>
    <button class="tab-btn" data-page="profilePage">👤<br>Profil</button>
</nav>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB7NwcT-nYQIJSfxh_s4u0D7YLCda4W5sda",
  authDomain: "blk-congo-29463.firebaseapp.com",
  projectId: "blk-congo-29463",
  storageBucket: "blk-congo-29463.firebasestorage.app",
  messagingSenderId: "1701093221836",
  appId: "1:1701093221836:web:809a6227325dfabce3969"
};

try {
  firebase.initializeApp(firebaseConfig);
  var auth = firebase.auth();
  var db = firebase.firestore();
} catch(e) {
  console.log("Firebase error:", e);
}

const BACKEND_URL = 'https://blk-marketplace.onrender.com';

function showAlert(msg, type = 'success') {
  const box = document.getElementById('alertBox');
  box.textContent = msg;
  box.className = `alert alert-${type} active`;
  setTimeout(() => box.classList.remove('active'), 3000);
}

document.getElementById('toggleFormBtn').addEventListener('click', () => {
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');
  const isLogin = loginForm.style.display ! 'none';
  
  loginForm.style.display = isLogin ? 'none' : 'block';
  signupForm.style.display = isLogin ? 'block' : 'none';
  
  document.getElementById('loginTitle').textContent = isLogin ? '📝 Inscription' : '🔐 Connexion';
  document.getElementById('toggleText').textContent = isLogin ? 'Déjà un compte? ' : 'Pas de compte? ';
});

document.getElementById('loginForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;

  if (auth) {
    auth.signInWithEmailAndPassword(email, password)
      .then(() => {
        showAlert('Connecté! 👋', 'success');
        showMainApp();
      })
      .catch(error => showAlert(error.message, 'error'));
  }
});

document.getElementById('signupForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const email = document.getElementById('signupEmail').value;
  const password = document.getElementById('signupPassword').value;
  const name = document.getElementById('signupName').value;

  if (auth) {
    auth.createUserWithEmailAndPassword(email, password)
      .then(async (cred) => {
        await cred.user.updateProfile({ displayName: name });
        showAlert('Compte créé! 🎉', 'success');
        showMainApp();
      })
      .catch(error => showAlert(error.message, 'error'));
  }
});

function showMainApp() {
  document.getElementById('loginPage').classList.remove('active');
  document.getElementById('header').style.display = 'flex';
  document.getElementById('container').style.display = 'block';
  document.getElementById('tabs').style.display = 'flex';
  document.getElementById('homePage').classList.add('active');
  loadArticles();
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const pageId = btn.dataset.page;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    btn.classList.add('active');
  });
});

async function loadArticles() {
  try {
    const response = await fetch(`${BACKEND_URL}/api/articles`);
    const data = await response.json();
    
    const grid = document.getElementById('articlesGrid');
    if (!data.data || data.data.length = 0) {
      grid.style.display = 'none';
      document.getElementById('emptyHome').style.display = 'block';
      return;
    }

    grid.innerHTML = '';
    data.data.forEach(article => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="${article.image || '📷'}" class="card-img" onerror="this.style.display='none';" />
        <div class="card-title">${article.title}</div>
        <div class="card-price">${article.price} FCFA</div>
      `;
      grid.appendChild(card);
    });

    grid.style.display = 'grid';
    document.getElementById('emptyHome').style.display = 'none';
  } catch (error) {
    console.log("Articles error:", error);
  }
}

document.getElementById('publishForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const user = auth && auth.currentUser;
  if (!user) {
    showAlert('Connecte-toi d\'abord', 'error');
    return;
  }

  const title = document.getElementById('articleTitle').value;
  const description = document.getElementById('articleDesc').value;
  const price = document.getElementById('articlePrice').value;

  try {
    const response = await fetch(`${BACKEND_URL}/api/articles`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        title, description, price: parseInt(price),
        image: '', sellerId: user.uid, sellerName: user.displayName || 'Anonyme'
      })
    });

    if (response.ok) {
      showAlert('Article publié! 🎉', 'success');
      document.getElementById('publishForm').reset();
      loadArticles();
    }
  } catch (error) {
    showAlert('Erreur', 'error');
  }
});

document.getElementById('btnLogout').addEventListener('click', () => {
  if (auth) {
    auth.signOut().then(() => {
      showAlert('Déconnecté', 'success');
      location.reload();
    });
  }
});

if (auth) {
  auth.onAuthStateChanged(user => {
    if (user) {
      showMainApp();
      document.getElementById('profileName').textContent = user.displayName || user.email;
      document.getElementById('profileEmail').textContent = user.email;
      document.getElementById('profileAuth').style.display = 'block';
      document.getElementById('profileNotAuth').style.display = 'none';
    }
  });
}
</script>


</body>
</html>
