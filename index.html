<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BLK — Mode Seconde Main Congo</title>

<!-- LEAFLET MAP -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-storage.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-messaging.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;500;600;700&display=swap');

:root {
  --red: #C82828;
  --yellow: #E6A01E;
  --green: #1A6B2A;
  --black: #0D0D0D;
  --white: #F5F0E8;
  --gray: #1C1C1C;
  --gray2: #2A2A2A;
  --text-muted: #777;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  background: var(--black);
  font-family: 'DM Sans', sans-serif;
  color: var(--white);
  max-width: 390px;
  margin: 0 auto;
  min-height: 100vh;
  overflow-x: hidden;
}

.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px 0;
  font-size: 12px;
  font-weight: 600;
  color: var(--white);
  background: var(--black);
  border-bottom: 1px solid var(--gray2);
}

.kente-accent {
  height: 3px;
  background: repeating-linear-gradient(
    90deg,
    var(--red) 0px, var(--red) 20px,
    var(--yellow) 20px, var(--yellow) 40px,
    var(--green) 40px, var(--green) 60px,
    var(--black) 60px, var(--black) 80px
  );
}

.screen {
  display: none;
  min-height: calc(100vh - 80px);
  padding-bottom: 80px;
  animation: fadeIn 0.3s ease;
}

.screen.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.nav-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  background: var(--gray);
  border-bottom: 1px solid var(--gray2);
  position: sticky;
  top: 0;
  z-index: 100;
}

.nav-brand {
  font-family: 'Archivo Black', sans-serif;
  font-size: 20px;
  background: linear-gradient(135deg, var(--yellow), var(--red));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.nav-icons {
  display: flex;
  gap: 12px;
}

.nav-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: var(--black);
  border: 1px solid var(--gray2);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 18px;
  transition: all 0.2s;
}

.nav-icon:active {
  transform: scale(0.95);
}

.badge {
  position: absolute;
  top: -8px;
  right: -8px;
  background: var(--red);
  color: var(--white);
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
}

.hero {
  padding: 20px;
  background: linear-gradient(135deg, rgba(230,160,30,0.15) 0%, rgba(200,40,40,0.1) 100%);
}

.hero h1 {
  font-family: 'Archivo Black', sans-serif;
  font-size: 24px;
  margin-bottom: 8px;
}

.hero p {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 16px;
}

.hero-buttons {
  display: flex;
  gap: 10px;
}

.hero-btn {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 12px;
}

.hero-btn-primary {
  background: linear-gradient(135deg, var(--yellow), #c8880a);
  color: var(--black);
}

.hero-btn-secondary {
  background: var(--green);
  color: var(--white);
}

.hero-btn:active {
  transform: scale(0.95);
}

.search-bar {
  padding: 16px 20px;
  display: flex;
  gap: 10px;
}

.search-input {
  flex: 1;
  background: var(--gray);
  border: 1px solid var(--gray2);
  border-radius: 12px;
  padding: 12px 14px;
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
}

.search-input::placeholder {
  color: var(--text-muted);
}

.search-btn {
  width: 44px;
  height: 44px;
  background: var(--yellow);
  border: none;
  border-radius: 12px;
  color: var(--black);
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.search-btn:active {
  transform: scale(0.95);
}

.articles-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 16px 20px;
}

.article-card {
  background: var(--gray);
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid var(--gray2);
}

.article-card:active {
  transform: scale(0.95);
}

.card-image {
  background: linear-gradient(135deg, rgba(230,160,30,0.3), rgba(200,40,40,0.3));
  height: 120px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  position: relative;
}

.card-distance {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(0,0,0,0.7);
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 10px;
  color: var(--yellow);
  font-weight: 700;
}

.card-info {
  padding: 12px;
}

.card-title {
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 6px;
}

.card-price {
  font-size: 14px;
  font-weight: 700;
  color: var(--yellow);
  margin-bottom: 4px;
}

.card-seller {
  font-size: 10px;
  color: var(--text-muted);
}

.map-container {
  width: 100%;
  height: 400px;
  border-radius: 0;
  margin: 16px 0 0 0;
}

.leaflet-container {
  border-radius: 0;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 14px;
}

.form-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-muted);
}

.form-input, .form-select, .form-textarea {
  background: var(--gray);
  border: 1px solid var(--gray2);
  border-radius: 12px;
  padding: 12px 14px;
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  transition: border-color 0.2s;
}

.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline: none;
  border-color: var(--yellow);
  background: #1f1f1f;
}

.form-input::placeholder {
  color: var(--text-muted);
}

.btn-primary {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--yellow), #c8880a);
  color: var(--black);
  border: none;
  border-radius: 12px;
  font-family: 'Archivo Black', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 8px 24px rgba(230,160,30,0.3);
}

.btn-primary:active {
  transform: scale(0.95);
}

.content {
  padding: 0 20px;
}

.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-width: 390px;
  margin: 0 auto;
  background: var(--gray);
  border-top: 1px solid var(--gray2);
  display: flex;
  justify-content: space-around;
  padding: 8px 0;
  z-index: 1000;
}

.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px 0;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 700;
  transition: all 0.2s;
}

.nav-btn.active {
  color: var(--yellow);
}

.nav-btn span:first-child {
  font-size: 20px;
}

.modal-backdrop {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 2000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-backdrop.active {
  display: flex;
}

.modal {
  background: var(--gray);
  border-radius: 16px;
  padding: 24px;
  width: 100%;
  max-width: 360px;
  max-height: 90vh;
  overflow-y: auto;
  border: 1px solid var(--gray2);
}

.modal h2 {
  font-family: 'Archivo Black', sans-serif;
  font-size: 20px;
  margin-bottom: 16px;
}

.wallet-card {
  background: linear-gradient(135deg, var(--yellow), #c8880a);
  color: var(--black);
  padding: 24px;
  border-radius: 14px;
  margin: 16px 0;
}

.wallet-balance {
  font-size: 32px;
  font-weight: 900;
  font-family: 'Archivo Black', sans-serif;
}

.wallet-label {
  font-size: 12px;
  opacity: 0.8;
}

.status-msg {
  background: rgba(26,107,42,0.2);
  border-left: 3px solid var(--green);
  padding: 12px 14px;
  border-radius: 8px;
  font-size: 12px;
  color: var(--green);
  margin: 16px 0;
}

.status-msg.error {
  background: rgba(200,40,40,0.2);
  border-left-color: var(--red);
  color: var(--red);
}

.profile-section {
  background: var(--gray);
  padding: 16px;
  border-radius: 12px;
  margin: 16px 0;
  border: 1px solid var(--gray2);
}

.profile-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--gray2);
}

.profile-row:last-child {
  border-bottom: none;
}

.profile-label {
  font-size: 12px;
  color: var(--text-muted);
}

.profile-value {
  font-weight: 700;
}
</style>
</head>
<body>

<div class="kente-accent"></div>

<div class="status-bar">
  <span>9:41</span>
  <div style="display:flex;gap:6px">
    <span>📶</span>
    <span>🔋</span>
  </div>
</div>

<div class="nav-top">
  <div class="nav-brand">🟢 BLK</div>
  <div class="nav-icons">
    <div class="nav-icon" onclick="switchPage('notifications')">
      🔔
      <span class="badge" id="notif-badge" style="display:none;">0</span>
    </div>
    <div class="nav-icon" onclick="switchPage('profile')">👤</div>
  </div>
</div>

<div id="home" class="screen active">
  <div class="hero">
    <h1>Bienvenue à BLK 🟢</h1>
    <p>La plus grande plateforme de mode<br>seconde main au Congo</p>
    <div class="hero-buttons">
      <button class="hero-btn hero-btn-primary" onclick="switchPage('home')">Acheter</button>
      <button class="hero-btn hero-btn-secondary" onclick="switchPage('seller')">Vendre</button>
    </div>
  </div>

  <div class="search-bar">
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 Chercher un article...">
    <button class="search-btn" onclick="performSearch()">🔎</button>
  </div>

  <div class="content">
    <div style="margin-top: 16px; margin-bottom: 8px;">
      <h2 style="font-family:'Archivo Black';font-size:16px">📍 Articles près de toi</h2>
    </div>
  </div>

  <div class="articles-grid" id="articlesContainer"></div>
</div>

<div id="map" class="screen">
  <div class="content" style="padding: 0;">
    <div style="padding: 16px 20px 0;">
      <h2 style="font-family:'Archivo Black';font-size:16px">🗺️ Vendeurs près de toi</h2>
    </div>
    <div class="map-container" id="mapContainer"></div>
    <div style="padding: 16px 20px;" id="vendorsNearby"></div>
  </div>
</div>

<div id="cart" class="screen">
  <div class="content">
    <h2 style="font-family:'Archivo Black';font-size:18px;margin-top:16px">🛒 Mon panier</h2>
    <div id="cartContainer" style="margin-top:16px"></div>
  </div>
</div>

<div id="seller" class="screen">
  <div class="content">
    <h2 style="font-family:'Archivo Black';font-size:18px;margin-top:16px">📦 Publier un article</h2>
    <form onsubmit="addArticle(event)" style="margin-top:16px">
      <div class="form-group">
        <label class="form-label">Titre de l'article</label>
        <input type="text" class="form-input" id="articleTitle" placeholder="ex: Robe Wax" required>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="articleDesc" placeholder="Décris ton article..." rows="4" required></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Prix (FCFA)</label>
        <input type="number" class="form-input" id="articlePrice" placeholder="ex: 5000" required>
      </div>
      <button type="submit" class="btn-primary">Publier l'article 🚀</button>
    </form>
  </div>
</div>

<div id="profile" class="screen">
  <div class="content">
    <h2 style="font-family:'Archivo Black';font-size:18px;margin-top:16px">👤 Mon profil</h2>
    <div id="profileContainer" style="margin-top:16px"></div>
  </div>
</div>

<div id="wallet" class="screen">
  <div class="content">
    <h2 style="font-family:'Archivo Black';font-size:18px;margin-top:16px">💰 Mon portefeuille</h2>
    <div id="walletContainer" style="margin-top:16px"></div>
  </div>
</div>

<div id="notifications" class="screen">
  <div class="content">
    <h2 style="font-family:'Archivo Black';font-size:18px;margin-top:16px">🔔 Notifications</h2>
    <div id="notificationsContainer" style="margin-top:16px"></div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="switchPage('home')">
    <span>🏠</span> Accueil
  </button>
  <button class="nav-btn" onclick="switchPage('map')">
    <span>🗺️</span> Carte
  </button>
  <button class="nav-btn" onclick="switchPage('cart')">
    <span>🛒</span> Panier
  </button>
  <button class="nav-btn" onclick="switchPage('seller')">
    <span>📦</span> Vendre
  </button>
  <button class="nav-btn" onclick="switchPage('wallet')">
    <span>💰</span> Compte
  </button>
</div>

<div class="modal-backdrop" id="loginModal">
  <div class="modal">
    <h2>Connexion 🔓</h2>
    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="loginEmail" placeholder="toi@gmail.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary">Se connecter</button>
    </form>
    <p style="text-align:center;margin-top:16px;font-size:12px;color:var(--text-muted)">
      Pas de compte? <a onclick="switchModal('registerModal')" style="color:var(--yellow);cursor:pointer;font-weight:700">S'inscrire →</a>
    </p>
  </div>
</div>

<div class="modal-backdrop" id="registerModal">
  <div class="modal">
    <h2>S'inscrire 🎉</h2>
    <form onsubmit="handleRegister(event)">
      <div class="form-group">
        <label class="form-label">Prénom</label>
        <input type="text" class="form-input" id="registerName" placeholder="Joëlle" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="registerEmail" placeholder="toi@gmail.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Téléphone MTN</label>
        <input type="tel" class="form-input" id="registerPhone" placeholder="+242 06 XXX XXX" required>
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input type="password" class="form-input" id="registerPassword" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary">Créer mon compte</button>
    </form>
  </div>
</div>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyB7NwcT-nYQ1jSFxh_m4uOD7YLCdAWSdm8",
  authDomain: "blk-congo-29463.firebaseapp.com",
  projectId: "blk-congo-29463",
  storageBucket: "blk-congo-29463.firebasestorage.app",
  messagingSenderId: "701093221836",
  appId: "1:701093221836:web:809a62273256fbabce3969"
};

const MTN_CONFIG = {
  API_KEY: '20a3746253a646a19f803a2b46eb5c58',
  BUSINESS_ID: 'e21820a3-320d-400a-b28e-8a2b53589ddc',
  API_URL: 'https://api.mtn.cm/momo/v1_0'
};

let db, auth, storage, messaging;

try {
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.firestore();
  auth = firebase.auth();
  storage = firebase.storage();
  messaging = firebase.messaging();
  console.log("✅ Firebase connecté!");
} catch (error) {
  console.error("❌ Firebase Error:", error);
}

let currentUser = null;
let userLocation = null;
let cart = [];
let articles = [];
let map = null;
let userBalance = 0;
let notifications = [];

function init() {
  checkUserSession();
  getCurrentLocation();
  loadArticles();
}

function checkUserSession() {
  const user = localStorage.getItem('blk_user');
  if (user) {
    currentUser = JSON.parse(user);
    userBalance = parseFloat(localStorage.getItem('blk_balance') || '0');
    displayUserUI();
  } else {
    document.getElementById('loginModal').classList.add('active');
  }
}

function getCurrentLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (position) => {
        userLocation = {
          lat: position.coords.latitude,
          lng: position.coords.longitude
        };
        console.log("✅ GPS:", userLocation);
      },
      (error) => {
        console.log("📍 GPS non disponible, utilisation localisation par défaut");
        userLocation = { lat: -4.2619, lng: 15.2429 };
      }
    );
  }
}

function loadArticles() {
  if (db) {
    db.collection('articles').onSnapshot((snapshot) => {
      articles = [];
      snapshot.forEach((doc) => {
        articles.push({
          id: doc.id,
          ...doc.data()
        });
      });
      displayArticles();
    });
  }
}

function displayArticles() {
  if (!userLocation) {
    setTimeout(displayArticles, 500);
    return;
  }

  const container = document.getElementById('articlesContainer');
  container.innerHTML = '';

  const sorted = articles
    .map(a => ({
      ...a,
      distance: calculateDistance(
        userLocation.lat, userLocation.lng,
        a.lat || -4.2619, a.lng || 15.2429
      )
    }))
    .sort((a, b) => a.distance - b.distance);

  sorted.forEach(article => {
    const html = `
      <div class="article-card" onclick="viewArticle('${article.id}')">
        <div class="card-image">
          ${article.image || '👗'}
          <div class="card-distance">📍 ${article.distance}km</div>
        </div>
        <div class="card-info">
          <div class="card-title">${article.name}</div>
          <div class="card-price">${article.price} FCFA</div>
          <div class="card-seller">👤 ${article.seller}</div>
        </div>
      </div>
    `;
    container.innerHTML += html;
  });
}

function calculateDistance(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLng/2) * Math.sin(dLng/2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return Math.round(R * c * 10) / 10;
}

function switchPage(page) {
  if (!currentUser && ['seller', 'wallet', 'profile'].includes(page)) {
    document.getElementById('loginModal').classList.add('active');
    return;
  }

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(page).classList.add('active');

  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  if (page === 'map') setTimeout(initMap, 100);
  if (page === 'cart') displayCart();
  if (page === 'profile') displayProfile();
  if (page === 'wallet') displayWallet();
}

function switchModal(modal) {
  document.querySelectorAll('.modal-backdrop').forEach(m => m.classList.remove('active'));
  document.getElementById(modal).classList.add('active');
}

function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;

  if (auth) {
    auth.signInWithEmailAndPassword(email, password)
      .then((userCredential) => {
        currentUser = {
          id: userCredential.user.uid,
          email: email,
          name: email.split('@')[0]
        };
        saveUserData();
        document.getElementById('loginModal').classList.remove('active');
        displayUserUI();
        loadArticles();
      })
      .catch((error) => {
        alert('❌ ' + error.message);
      });
  }
}

function handleRegister(e) {
  e.preventDefault();
  const name = document.getElementById('registerName').value;
  const email = document.getElementById('registerEmail').value;
  const phone = document.getElementById('registerPhone').value;
  const password = document.getElementById('registerPassword').value;

  if (auth) {
    auth.createUserWithEmailAndPassword(email, password)
      .then((userCredential) => {
        currentUser = {
          id: userCredential.user.uid,
          email: email,
          name: name,
          phone: phone
        };
        userBalance = 0;
        saveUserData();

        if (db) {
          db.collection('users').doc(userCredential.user.uid).set({
            name: name,
            email: email,
            phone: phone,
            balance: 0,
            createdAt: new Date()
          });
        }

        document.getElementById('registerModal').classList.remove('active');
        displayUserUI();
      })
      .catch((error) => {
        alert('❌ ' + error.message);
      });
  }
}

function saveUserData() {
  if (currentUser) {
    localStorage.setItem('blk_user', JSON.stringify(currentUser));
    localStorage.setItem('blk_balance', userBalance.toString());
  }
}

function displayUserUI() {
  // Mise à jour UI
}

function addArticle(e) {
  e.preventDefault();
  
  const article = {
    name: document.getElementById('articleTitle').value,
    desc: document.getElementById('articleDesc').value,
    price: parseInt(document.getElementById('articlePrice').value),
    seller: currentUser.name,
    lat: userLocation?.lat || -4.2619,
    lng: userLocation?.lng || 15.2429,
    image: '📦',
    createdAt: new Date()
  };

  if (db) {
    db.collection('articles').add(article)
      .then(() => {
        alert('✅ Article publié!');
        e.target.reset();
        loadArticles();
        switchPage('home');
      })
      .catch(err => alert('❌ ' + err.message));
  }
}

function addToCart(articleId) {
  const article = articles.find(a => a.id === articleId);
  if (article) {
    cart.push(article);
    alert('✅ Article ajouté au panier!');
  }
}

function displayCart() {
  const container = document.getElementById('cartContainer');
  
  if (cart.length === 0) {
    container.innerHTML = '<p style="text-align:center;padding:40px;color:var(--text-muted)">Panier vide</p>';
    return;
  }

  let total = 0;
  let html = '';

  cart.forEach((item, i) => {
    total += item.price;
    html += `
      <div style="background:var(--gray);padding:12px;border-radius:10px;margin-bottom:10px;border:1px solid var(--gray2)">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:700">${item.name}</div>
            <div style="font-size:12px;color:var(--text-muted)">${item.price} FCFA</div>
          </div>
          <button onclick="cart.splice(${i},1);displayCart()" style="background:var(--red);color:white;border:none;padding:6px 10px;border-radius:6px;cursor:pointer">❌</button>
        </div>
      </div>
    `;
  });

  const fee = Math.round(total * 0.05);
  const finalTotal = total + fee;

  html += `
    <div style="background:linear-gradient(135deg,var(--yellow),#c8880a);color:var(--black);padding:16px;border-radius:12px;margin-top:16px">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span>Sous-total:</span>
        <strong>${total} FCFA</strong>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:12px">
        <span>Frais (5%):</span>
        <strong>+${fee} FCFA</strong>
      </div>
      <div style="border-top:2px solid rgba(0,0,0,0.2);padding-top:12px;display:flex;justify-content:space-between;font-weight:900;font-size:16px">
        <span>TOTAL:</span>
        <span>${finalTotal} FCFA</span>
      </div>
      <button onclick="initiatePayment(${finalTotal})" style="width:100%;margin-top:12px;background:var(--black);color:var(--yellow);border:none;padding:12px;border-radius:8px;font-weight:700;cursor:pointer">💳 PAYER MTN</button>
    </div>
  `;

  container.innerHTML = html;
}

function initiatePayment(amount) {
  alert(`📱 Paiement MTN RÉEL initié!\n\nMontant: ${amount} FCFA\nNuméro: ${currentUser.phone}\n\nVérification en cours...`);
  
  if (MTN_CONFIG.API_KEY !== 'COLLE_TA_CLE_MTN_ICI') {
    processPaymentMTN(amount);
  } else {
    alert('❌ Clé MTN non configurée. Configure d\'abord!');
  }
}

async function processPaymentMTN(amount) {
  try {
    const response = await fetch(`${MTN_CONFIG.API_URL}/requesttopay`, {
      method: 'POST',
      headers: {
        'X-Reference-Id': 'BLK-' + Date.now(),
        'X-Target-Environment': 'mtncongo',
        'Ocp-Apim-Subscription-Key': MTN_CONFIG.API_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        amount: amount.toString(),
        currency: 'XAF',
        externalId: 'BLK-' + Date.now(),
        payer: {
          partyIdType: 'MSISDN',
          partyId: currentUser.phone
        }
      })
    });

    if (response.ok) {
      alert('✅ Paiement confirmé! Commande sauvegardée.');
      userBalance += Math.round(amount * 0.92);
      saveUserData();
      cart = [];
      displayCart();
    }
  } catch (error) {
    console.error(error);
    alert('❌ Erreur paiement: ' + error.message);
  }
}

function initMap() {
  if (map) return;
  if (!userLocation) return;

  const container = document.getElementById('mapContainer');
  map = L.map(container).setView([userLocation.lat, userLocation.lng], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 19
  }).addTo(map);

  L.circleMarker([userLocation.lat, userLocation.lng], {
    color: '#E6A01E',
    radius: 8,
    weight: 3
  }).addTo(map).bindPopup('📍 Toi');

  articles.forEach(article => {
    L.marker([article.lat || -4.2619, article.lng || 15.2429])
      .addTo(map)
      .bindPopup(`<b>${article.name}</b><br>${article.price} FCFA`);
  });
}

function displayProfile() {
  const container = document.getElementById('profileContainer');
  container.innerHTML = `
    <div class="profile-section">
      <div class="profile-row">
        <span class="profile-label">Nom</span>
        <span class="profile-value">${currentUser.name}</span>
      </div>
      <div class="profile-row">
        <span class="profile-label">Email</span>
        <span class="profile-value">${currentUser.email}</span>
      </div>
      <div class="profile-row">
        <span class="profile-label">Téléphone</span>
        <span class="profile-value">${currentUser.phone || 'N/A'}</span>
      </div>
    </div>
  `;
}

function displayWallet() {
  const container = document.getElementById('walletContainer');
  container.innerHTML = `
    <div class="wallet-card">
      <div class="wallet-label">Solde disponible</div>
      <div class="wallet-balance">${userBalance} FCFA</div>
    </div>
    <button class="btn-primary" onclick="initiateWithdrawal()">💳 Retirer les fonds</button>
  `;
}

function initiateWithdrawal() {
  if (userBalance < 1000) {
    alert('❌ Minimum 1000 FCFA pour retirer');
    return;
  }
  alert(`✅ Retrait de ${userBalance} FCFA initié!\n\nVirement vers: ${currentUser.phone}`);
  userBalance = 0;
  saveUserData();
  displayWallet();
}

function performSearch() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const filtered = articles.filter(a => a.name.toLowerCase().includes(query));
}

function viewArticle(articleId) {
  const article = articles.find(a => a.id === articleId);
  if (article) {
    addToCart(articleId);
  }
}

init();
</script>
